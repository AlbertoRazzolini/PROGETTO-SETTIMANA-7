<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SportsHub — Eventi sportivi</title>
    <link rel="stylesheet" href="assets/css/style.css" />
  </head>
  <body>
    <header class="site-header">
      <h1>SportsHub</h1>
      <p>
        Cerca una squadra, scropri le prossime partite e gli ultimi risultati
      </p>
      <div class="search-bar">
        <input
          type="text"
          placeholder="Inserisci il nome della squadra..."
          id="search-input"
        />
        <button id="search-btn">Cerca</button>
      </div>
    </header>

    <main class="container">
      <section id="risultati-section">
        <!-- Spinner, errore, lista risultati ricerca squadre -->
      </section>

      <section id="dettagli-section" hidden>
        <!-- Visibile dopo click su una squadra: prossimi eventi + ultimi risultati -->
      </section>
    </main>

    <script src="assets/js/script.js"></script>
  </body>
</html>
